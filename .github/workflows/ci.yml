name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install ipykernel "pdv-python/[dev]"

      - name: Install Node dependencies
        working-directory: electron
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build
        working-directory: electron
        run: npm run build

      - name: Python tests
        working-directory: pdv-python
        run: pytest tests/ -v

      - name: Node tests
        working-directory: electron
        env:
          PYTHON_PATH: python3
        run: npm run test
