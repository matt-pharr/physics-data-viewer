      <stop offset="0%" stop-color="#FFC1C1"/>
      <stop offset="100%" stop-color="#FF8A8A"/>
    </radialGradient>
    <radialGradient id="redGradBottom" gradientUnits="userSpaceOnUse" cx="236" cy="306" fx="236" fy="306" r="80">
      <stop offset="0%" stop-color="#FFC1C1"/>
      <stop offset="100%" stop-color="#FF8A8A"/>
    </radialGradient>
    <radialGradient id="blueGradLeft" gradientUnits="userSpaceOnUse" cx="181" cy="236" fx="181" fy="236" r="80">
