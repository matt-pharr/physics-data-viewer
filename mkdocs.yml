site_name: PDV - Physics Data Viewer
site_description: Desktop application for computational and experimental physics analysis
site_url: https://matt-pharr.github.io/physics-data-viewer/
repo_url: https://github.com/matt-pharr/physics-data-viewer
repo_name: matt-pharr/physics-data-viewer
edit_uri: edit/develop/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

extra:
  version:
    provider: mike
    default: latest

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [pdv-python]
          options:
            docstring_style: numpy
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            merge_init_into_class: true
            members_order: source
            heading_level: 2
            filters:
              - "!^_"
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true
      enable_git_follow: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path:
        - .
        - docs
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
  - User Guide:
      - Overview: user-guide/index.md
      - The Tree: user-guide/tree.md
      - Code Editor: user-guide/code-editor.md
      - Scripts: user-guide/scripts.md
      - Notes: user-guide/notes.md
      - Projects: user-guide/projects.md
      - Modules: user-guide/modules.md
  - API Reference:
      - Overview: api-reference/index.md
      - The Tree (pdv_tree): api-reference/tree.md
      - Tree Node Types: api-reference/nodes.md
      - The App Object (pdv): api-reference/app.md
      - Module API: api-reference/module-api.md
      - Exceptions: api-reference/errors.md
  - Module Development:
      - Overview: modules/index.md
      - Manifest Format: modules/manifest.md
      - GUI Definitions: modules/gui.md
      - Library Files: modules/lib.md
      - Entry Points: modules/entry-points.md
  - Developer Guide:
      - Architecture: developer/architecture.md
      - Developer Quick Start: developer/developer-quickstart.md
      - Contributing: developer/contributing.md
      - Development Setup: developer/setup.md
      - Testing: developer/testing.md
  - Changelog: changelog/index.md
